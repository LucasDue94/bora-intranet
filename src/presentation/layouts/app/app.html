<div
  class="app-shell surface-ground text-color min-h-screen"
  [class.app-shell--collapsed]="!isSidebarOpen()"
>
  <app-sidebar-menu
    [isOpen]="isSidebarOpen()"
    [navigationItems]="navigationItems"
    (toggleMenu)="toggleSidebar()"
  />

  <div class="app-main min-w-0">
    <header
      class="app-header surface-card surface-border border-bottom-1 flex align-items-center justify-content-between gap-3 px-4"
    >
      <div class="app-header__start flex align-items-center gap-2 min-w-0">
        <div class="app-header__title grid gap-1 min-w-0">
          <strong class="text-color font-semibold line-height-1 white-space-nowrap">
            Espaco principal
          </strong>
          <span class="text-color-secondary text-sm line-height-1 white-space-nowrap">
            Operacao e gestao de eventos
          </span>
        </div>
      </div>

      <div class="app-header__user flex align-items-center gap-3">
        <div class="app-header__user-info grid gap-1 text-right">
          <strong class="text-color font-semibold line-height-1">Marina Costa</strong>
          <span class="text-color-secondary text-sm line-height-1">Coordenacao de eventos</span>
        </div>
        <p-avatar label="MC" shape="circle" size="large" />
      </div>
    </header>

    <main class="grid app-content overflow-auto p-4 min-w-0">
      <router-outlet />

      <section class="app-content__empty surface-card surface-border border-1 border-round p-4">
        <div class="grid gap-2">
          <strong class="text-color font-semibold line-height-1">Navegacao principal</strong>
          <span class="text-color-secondary text-sm line-height-1">
            Conteudo carregado pelas rotas
          </span>
        </div>
        <p class="text-color-secondary line-height-3 m-0">
          Este espaco recebe as paginas da intranet via roteamento Angular. Use o menu lateral para
          navegar entre as areas do sistema.
        </p>
      </section>
    </main>
  </div>
</div>
