<section class="login-page">
  <form class="login-page__form surface-card surface-border border-1">
    <div class="login-page__header">
      <h1 class="login-page__title m-0">Entrar</h1>
    </div>

    <div class="login-page__fields">
      <p-floatlabel variant="in" class="login-page__field">
        <input pInputText id="login-email" type="email" class="login-page__input w-full" />
        <label for="login-email">Email</label>
      </p-floatlabel>

      <p-floatlabel variant="in" class="login-page__field">
        <input pInputText id="login-password" type="password" class="login-page__input w-full" />
        <label for="login-password">Senha</label>
      </p-floatlabel>
    </div>
  </form>
</section>
