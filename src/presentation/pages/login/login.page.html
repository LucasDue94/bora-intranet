<section class="login-page">
  <form
    class="login-page__form surface-card surface-border border-1"
    [formGroup]="loginForm"
    (ngSubmit)="login()"
  >
    <div class="login-page__header">
      <h1 class="login-page__title m-0">Entrar</h1>
    </div>

    <div class="login-page__fields">
      <p-floatlabel variant="in" class="login-page__field">
        <input
          pInputText
          id="login-email"
          type="email"
          class="login-page__input w-full"
          formControlName="email"
          autocomplete="email"
        />
        <label for="login-email">Email</label>
      </p-floatlabel>

      <p-floatlabel variant="in" class="login-page__field">
        <input
          pInputText
          id="login-password"
          type="password"
          class="login-page__input w-full"
          formControlName="password"
          autocomplete="current-password"
        />
        <label for="login-password">Senha</label>
      </p-floatlabel>
    </div>

    @if (errorMessage()) {
      <p class="login-page__error m-0">
        {{ errorMessage() }}
      </p>
    }

    <p-button
      type="submit"
      label="Entrar"
      styleClass="login-page__submit w-full"
      [loading]="isLoading()"
      [disabled]="loginForm.invalid"
    />
  </form>
</section>
